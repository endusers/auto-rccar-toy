# For parameter descriptions, please refer to the template parameter files for each node.

ekf_filter_local_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: odometry/lidar
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: true
    odom0_queue_size: 10

    # imu0: lidar/imu
    # imu0_config: [false, false, false,
    #               false, false, true,
    #               false, false, false,
    #               false, false, true,
    #               false, false, false]
    # imu0_nodelay: false
    # imu0_differential: false
    # imu0_relative: false
    # imu0_queue_size: 10
    # imu0_remove_gravitational_acceleration: true

    use_control: false
